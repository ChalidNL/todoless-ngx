name: todoless

services:
  todoless:
    build: .
    container_name: todoless
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - todoless-data:/app/data
    environment:
      - PORT=3000
      - DATA_DIR=/app/data
      - NODE_ENV=production
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})\""]
      timeout: 5s
      interval: 30s
      retries: 5
      start_period: 30s
    labels:
      casaos.app.name: Todoless
      casaos.icon: https://raw.githubusercontent.com/ChalidNL/todoless/main/public/icons/todoless-bw.svg
      icon: https://github.com/ChalidNL/todoless/blob/main/public/icons/todoless-bw.png?raw=true

volumes:
  todoless-data:

networks:
  default:
    name: todoless-net

x-casaos:
  author: ChalidNL
  category: productivity
  hostname: ""
  icon: https://github.com/ChalidNL/todoless/blob/main/public/icons/todoless-bw.png?raw=true
  index: /
  is_uncontrolled: false
  port_map: "3000"
  scheme: http
  store_app_id: todoless
  title:
    custom: Todoless
    en_us: Todoless
