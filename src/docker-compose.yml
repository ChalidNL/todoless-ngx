name: todoless

services:

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:0.22.0
    container_name: todoless-pocketbase
    restart: unless-stopped
    environment:
      PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL:-admin@todoless.local}
      PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD:-changeme123}
    volumes:
      - pb_data:/pb_data
      - ./pb_migrations:/pb_migrations
    networks:
      - todoless-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todoless-frontend
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-7070}:80"
    depends_on:
      pocketbase:
        condition: service_healthy
    networks:
      - todoless-net

networks:
  todoless-net:
    driver: bridge

volumes:
  pb_data:
