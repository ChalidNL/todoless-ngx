# Development docker-compose configuration
# Use: docker-compose -f docker-compose.dev.yml up
name: todoless-ngx-dev

services:
  # Only database for development
  # Frontend and backend run locally via npm run dev
  todoless-ngx-db:
    image: postgres:16-alpine
    container_name: todoless-ngx-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-todoless}
      POSTGRES_USER: ${POSTGRES_USER:-todoless}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-todoless}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - todoless-ngx-db-dev-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"  # Exposed for local development
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-todoless} -d ${POSTGRES_DB:-todoless}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - todoless-ngx-dev-net

volumes:
  todoless-ngx-db-dev-data:

networks:
  todoless-ngx-dev-net:
    name: todoless-ngx-dev_net
    driver: bridge
