version: "3.8"

services:
  # SERVICE 1: PocketBase — database + auth + realtime + admin UI
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: todoless-pocketbase
    restart: unless-stopped
    environment:
      PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL}
      PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD}
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb_data
      - ./pb_migrations:/pb_migrations
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - todoless-net
    labels:
      casaos.name: "To Do Less - Database"
      casaos.icon: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/database.png"

  # SERVICE 2: Frontend — React app built and served by nginx
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.pocketbase
      args:
        VITE_POCKETBASE_URL: ${VITE_POCKETBASE_URL:-http://localhost:8090}
    image: todoless-frontend:latest
    container_name: todoless-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      pocketbase:
        condition: service_healthy
    networks:
      - todoless-net
    labels:
      casaos.name: "To Do Less"
      casaos.description: "Self-hosted multi-user task manager"
      casaos.category: "Productivity"
      casaos.icon: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/tasks.png"
      casaos.port.map: "80:80"
      casaos.main: "frontend"

networks:
  todoless-net:
    driver: bridge

volumes:
  pb_data:
