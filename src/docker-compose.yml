name: todoless-ngx

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todoless-ngx-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - todoless-net
    labels:
      casaos.app.name: Todoless-ngx
      casaos.icon: https://raw.githubusercontent.com/ChalidNL/todoless-ngx/main/public/icon.png
      icon: https://raw.githubusercontent.com/ChalidNL/todoless-ngx/main/public/icon.png

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todoless-ngx-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: todoless
      DB_USER: todoless
      DB_PASSWORD: todoless_secure_password_change_me
      JWT_SECRET: change-this-secret-key-in-production-use-at-least-32-random-characters
      CORS_ORIGIN: "*"
      COOKIE_SECURE: "false"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:4000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - todoless-net
    labels:
      icon: https://raw.githubusercontent.com/ChalidNL/todoless-ngx/main/public/icon.png

  db:
    image: postgres:16-alpine
    container_name: todoless-ngx-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: todoless
      POSTGRES_USER: todoless
      POSTGRES_PASSWORD: todoless_secure_password_change_me
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todoless -d todoless"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - todoless-net

volumes:
  db-data:
    name: todoless-ngx-db-data

networks:
  todoless-net:
    name: todoless-ngx-net
    driver: bridge

x-casaos:
  author: ChalidNL
  category: productivity
  hostname: ""
  icon: https://raw.githubusercontent.com/ChalidNL/todoless-ngx/main/public/icon.png
  index: /
  is_uncontrolled: false
  port_map: "3000"
  scheme: http
  store_app_id: todoless-ngx
  title:
    custom: Todoless-ngx
    en_us: Todoless-ngx
  description:
    en_us: "Multi-user task management with PostgreSQL - Real-time sync, private labels, auto-archive"
