name: Build & Publish Docker Images

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: chalidnl

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Docker metadata
        id: meta
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "fe_tag=latest" >> $GITHUB_OUTPUT
            echo "pb_tag=latest" >> $GITHUB_OUTPUT
          else
            echo "fe_tag=dev" >> $GITHUB_OUTPUT
            echo "pb_tag=dev" >> $GITHUB_OUTPUT
          fi
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/chalidnl/todoless-web-frontend:${{ steps.meta.outputs.fe_tag }}
            ghcr.io/chalidnl/todoless-web-frontend:${{ github.sha }}
          build-args: |
            VITE_GIT_COMMIT=${{ github.sha }}
            VITE_APP_VERSION=${{ steps.meta.outputs.branch }}

      - name: Build & push pocketbase
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.pocketbase
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/chalidnl/todoless-web-pocketbase:${{ steps.meta.outputs.pb_tag }}
            ghcr.io/chalidnl/todoless-web-pocketbase:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
