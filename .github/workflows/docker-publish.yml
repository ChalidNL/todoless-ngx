name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/chalidnl/todoless-ngx
  POCKETBASE_IMAGE: ghcr.io/chalidnl/todoless-ngx-pocketbase

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund

      - name: Validate frontend production build
        env:
          VITE_POCKETBASE_URL: http://pocketbase:8090
        run: npm run build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Frontend image ──────────────────────────────────────────────────────
      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── PocketBase image (migration bundled) ────────────────────────────────
      - name: Extract metadata for pocketbase
        id: meta-pocketbase
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.POCKETBASE_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push pocketbase image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.pocketbase
          push: true
          tags: ${{ steps.meta-pocketbase.outputs.tags }}
          labels: ${{ steps.meta-pocketbase.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
