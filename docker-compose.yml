# https://github.com/ChalidNL/todoless-ngx
name: todoless-ngx

services:
  todoless-ngx:
    image: ghcr.io/chalidnl/todoless-ngx:latest
    pull_policy: always
    container_name: todoless-ngx
    restart: unless-stopped
    environment:
      TZ: Europe/Amsterdam
    ports:
      - target: 80
        published: 7070
        protocol: tcp
    depends_on:
      pocketbase:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - todoless-net
    x-casaos:
      envs:
        - container: TZ
          description:
            en_US: Timezone
      ports:
        - container: "80"
          description:
            en_US: Web UI

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:0.34.2
    pull_policy: always
    container_name: todoless-ngx-pocketbase
    restart: unless-stopped
    command:
      - /bin/sh
      - -ec
      - |
        mkdir -p /pb_data /pb_migrations

        # Ensure downloader exists in this image (Alpine/Debian variants)
        if ! command -v wget >/dev/null 2>&1 && ! command -v curl >/dev/null 2>&1; then
          if command -v apk >/dev/null 2>&1; then
            apk add --no-cache wget ca-certificates
          elif command -v apt-get >/dev/null 2>&1; then
            apt-get update && apt-get install -y --no-install-recommends wget ca-certificates && rm -rf /var/lib/apt/lists/*
          fi
        fi

        echo "[entrypoint] validating migrations..."
        for f in 001_initial_schema.js 002_cross_relations.js 003_rewards_system.js 004_add_autodate_fields.js 005_invite_registration_rules.js; do
          if [ ! -s "/pb_migrations/$f" ]; then
            echo "[entrypoint] fetching migration: $f"
            if command -v wget >/dev/null 2>&1; then
              wget -qO "/pb_migrations/$f" "https://raw.githubusercontent.com/ChalidNL/todoless-ngx/main/pb_migrations/$f"
            elif command -v curl >/dev/null 2>&1; then
              curl -fsSL "https://raw.githubusercontent.com/ChalidNL/todoless-ngx/main/pb_migrations/$f" -o "/pb_migrations/$f"
            else
              echo "[entrypoint] ERROR: neither wget nor curl is available" >&2
              exit 1
            fi
          fi
        done

        exec /usr/local/bin/pocketbase serve --http=0.0.0.0:8090 --dir=/pb_data --migrationsDir=/pb_migrations --automigrate
    environment:
      TZ: Europe/Amsterdam
    expose:
      - "8090"
    # CasaOS note: disable PB healthcheck to avoid false-unhealthy on minimal images.
    # PB startup is validated by container running state and app-level retry logic.
    # healthcheck:
    #   test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8090/api/health || exit 1"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 10
    #   start_period: 20s
    volumes:
      - /DATA/AppData/todoless-ngx/pb_data:/pb_data
      - /DATA/AppData/todoless-ngx/pb_migrations:/pb_migrations
    networks:
      - todoless-net
    x-casaos:
      volumes:
        - container: /pb_data
          description:
            en_US: PocketBase data — database and uploads
        - container: /pb_migrations
          description:
            en_US: PocketBase migration scripts

networks:
  todoless-net:
    driver: bridge

x-casaos:
  architectures:
    - amd64
    - arm64
  main: todoless-ngx
  author: self-hosted
  category: Productivity
  description:
    en_US: todoless-ngx — self-hosted multi-user task manager. Tasks, notes, calendar, brain dumps, real-time sync. Free forever.
  icon: https://cdn.jsdelivr.net/gh/ChalidNL/todoless-ngx@main/src/public/icon.svg
  tagline:
    en_US: Self-hosted productivity app
  title:
    en_US: todoless-ngx
  port_map: "7070"
  scheme: http
  index: /
