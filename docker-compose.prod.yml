# https://github.com/ChalidNL/todoless-ngx
################################################################################
# todoless-ngx — Production Docker Compose
# Deploy: docker compose -f docker-compose.prod.yml up -d
################################################################################
name: todoless-ngx

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: todoless-ngx
    restart: unless-stopped
    environment:
      TZ: Europe/Amsterdam
    ports:
      - "7070:80"
    depends_on:
      pocketbase:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - todoless-net

  pocketbase:
    build:
      context: .
      dockerfile: Dockerfile.pocketbase
    container_name: todoless-ngx-pocketbase
    restart: unless-stopped
    command: ["serve", "--http=0.0.0.0:8090", "--dir=/pb_data"]
    environment:
      TZ: Europe/Amsterdam
    expose:
      - "8090"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8090/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - pb_data:/pb_data
    networks:
      - todoless-net

volumes:
  pb_data:
    driver: local

networks:
  todoless-net:
    driver: bridge
