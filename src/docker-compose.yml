name: todoless-ngx

services:
  todoless-ngx-frontend:
    cpu_shares: 90
    command: []
    container_name: todoless-ngx-frontend
    depends_on:
      todoless-ngx-backend:
        condition: service_healthy
        required: true
    deploy:
      resources:
        limits:
          memory: 2048M
    image: ghcr.io/chalidnl/todoless-ngx-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile
    hostname: todoless-ngx
    labels:
      casaos.app.name: Todoless-ngx
      casaos.icon: https://raw.githubusercontent.com/ChalidNL/todoless-ngx/main/public/icon.png
      icon: https://raw.githubusercontent.com/ChalidNL/todoless-ngx/main/public/icon.png
    ports:
      - target: 80
        published: "3000"
        protocol: tcp
    restart: unless-stopped
    volumes: []
    devices: []
    cap_add: []
    networks:
      - todoless-ngx-net
    privileged: false

  todoless-ngx-backend:
    cpu_shares: 90
    command: []
    container_name: todoless-ngx-backend
    depends_on:
      todoless-ngx-db:
        condition: service_healthy
        required: true
    deploy:
      resources:
        limits:
          memory: 2048M
    image: ghcr.io/chalidnl/todoless-ngx-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=4000
      - DB_HOST=todoless-ngx-db
      - DB_PORT=5432
      - DB_NAME=todoless
      - DB_USER=todoless
      - DB_PASSWORD=todoless_secure_password_change_me
      - JWT_SECRET=change-this-secret-key-in-production-use-at-least-32-random-characters
      - CORS_ORIGIN=*
      - COOKIE_SECURE=false
    hostname: todoless-ngx-backend
    healthcheck:
      test:
        - CMD-SHELL
        - wget --spider -q http://localhost:4000/api/health || exit 1
      timeout: 5s
      interval: 30s
      retries: 5
      start_period: 1m0s
    labels:
      icon: https://raw.githubusercontent.com/ChalidNL/todoless-ngx/main/public/icon.png
    ports:
      - target: 4000
        published: "4000"
        protocol: tcp
    restart: unless-stopped
    volumes: []
    devices: []
    cap_add: []
    networks:
      - todoless-ngx-net
    privileged: false

  todoless-ngx-db:
    cpu_shares: 90
    command: []
    container_name: todoless-ngx-db
    deploy:
      resources:
        limits:
          memory: 1024M
    environment:
      - POSTGRES_DB=todoless
      - POSTGRES_USER=todoless
      - POSTGRES_PASSWORD=todoless_secure_password_change_me
      - PGDATA=/var/lib/postgresql/data/pgdata
    hostname: todoless-ngx-db
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U todoless -d todoless
      timeout: 5s
      interval: 10s
      retries: 5
      start_period: 30s
    image: postgres:16-alpine
    labels:
      icon: https://raw.githubusercontent.com/ChalidNL/todoless-ngx/main/public/icon.png
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/AppData/todoless-ngx/db
        target: /var/lib/postgresql/data
      - type: bind
        source: ./database/init.sql
        target: /docker-entrypoint-initdb.d/init.sql
        read_only: true
    devices: []
    cap_add: []
    networks:
      - todoless-ngx-net
    privileged: false

networks:
  todoless-ngx-net:
    name: todoless-ngx_todoless-ngx-net
    driver: bridge

x-casaos:
  author: ChalidNL
  category: productivity
  hostname: ""
  icon: https://raw.githubusercontent.com/ChalidNL/todoless-ngx/main/public/icon.png
  index: /
  is_uncontrolled: false
  port_map: "3000"
  scheme: http
  store_app_id: todoless-ngx
  title:
    custom: Todoless-ngx
    en_us: Todoless-ngx
  description:
    en_us: Multi-user task management with PostgreSQL - Real-time sync, private labels, auto-archive